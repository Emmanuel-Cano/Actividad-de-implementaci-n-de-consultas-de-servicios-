<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>localStorage</title>
</head>
<body>
    <header>
        <h1 class="saludo">Nombre:</h1>
        <h1 class="saludo2">Apellido:</h1>
        <h1 class="saludo3">Edad:</h1>
        <h1 class="saludo4">Fecha de nacimiento:</h1>
    </header>

    <main>
        <label>Nombre:</label>
        <input type="text" class="nombre">
        <button class="btnGuardarNombre">Guardar</button> <br>

        <label>Apellido:</label>
        <input type="text" class="apellido">
        <button class="btnGuardarApellido">Guardar</button> <br>

        <label>Edad:</label>
        <input type="text" class="edad">
        <button class="btnGuardarEdad">Guardar</button> <br>

        <label>Fecha de nacimiento:</label>
        <input type="date" class="dia">
        <button class="btnGuardarDia">Guardar</button>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
